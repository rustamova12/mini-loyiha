<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Matematik Kalkulyator</title>
    
   

<style>
body{
    font-family: Arial;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.calculator{
    background: white;
    padding: 30px;
    border-radius: 10px;
    text-align: center;
    width: 300px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

input{
    width: 90%;
    padding: 10px;
    margin: 10px 0;
}

.buttons button{
    padding: 10px 15px;
    margin: 5px;
    font-size: 18px;
    cursor: pointer;
}

button:hover{
    background: #ddd;
}
</style>

</head>
<body>

<div class="calculator">
<h2>Kalkulyator</h2>

<input type="number" id="num1" placeholder="1-son">
<input type="number" id="num2" placeholder="2-son">

<div class="buttons">
<button onclick="add()">+</button>
<button onclick="sub()">-</button>
<button onclick="mul()">×</button>
<button onclick="div()">÷</button>
</div>

<h3>Natija: <span id="result">0</span></h3>
</div>

<script>
function add(){
let a = Number(document.getElementById("num1").value);
let b = Number(document.getElementById("num2").value);
document.getElementById("result").innerText = a + b;
}

function sub(){
let a = Number(document.getElementById("num1").value);
let b = Number(document.getElementById("num2").value);
document.getElementById("result").innerText = a - b;
}

function mul(){
let a = Number(document.getElementById("num1").value);
let b = Number(document.getElementById("num2").value);
document.getElementById("result").innerText = a * b;
}

function div(){
let a = Number(document.getElementById("num1").value);
let b = Number(document.getElementById("num2").value);
document.getElementById("result").innerText = a / b;
}
</script>

</body>
</html>
